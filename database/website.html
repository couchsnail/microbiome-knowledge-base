    <body>
        <h1 class = "d-flex align-items-center gap-3">Microbiome Data Upload</h1>
        <p class = "d-flex align-items-center gap-3">You can upload a csv file and view the columns and data appropriately.</p>

        <div class="file_upload">
            <div class="card">
                <div class="row">
                <form>
                    <label for="myfile"><b>Upload a CSV file:</b></label>
                    <div class="col-6 d-flex align-items-center gap-3">
                        <input type="file" class = "form-control w-auto" id="myfile" name="myfile" accept=".csv" required>
                        <button type="submit" class ="btn btn-primary" id="submit-file" >Upload File</button>
                    </div>
                </form>
            </div>
            </div>
        </div>
        
        <!--Pagination saved for later since it's overcomplicating things right now-->

        <div class = "custom_attribute_search">
            <div class = "card">
                <label><b>Filter by Custom Attributes</b></label>
                <div class = "d-flex align-items-center gap-3">
                    <form id="custom_attribute_search_form" class="d-flex align-items-center gap-2">
                        <input name="customAttribute" class = "form-control" id="customAttribute" placeholder="e.g. control" type="text">
                        <input type="submit" class = "btn btn-outline-secondary" id="customSearchSubmit" value="Search">
                    </form> 
                </div>
                <p id="search_results" style="display: none;"><span id="numberStudies">0</span> studies found </p>
            </div>
        </div>

                <thead>
                    <tr id="header_row"></tr>
                </thead>
                <tbody id="micro_table_body"></tbody>
            </table>
        </div>
