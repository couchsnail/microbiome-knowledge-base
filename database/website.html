<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="author" content="Amelie Sicat">
        <meta name="description" content="Website Code for storing Microbiome Data">

        <!--Local scripts-->
        <script type="text/javascript" src="js/about.js"></script>

        <!--stylesheets-->
        <!--NOTE: Will add bootstrap to add other buttons and other fun things later-->
        <!--bootstrap-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
        <link rel="stylesheet" href="css/style.css">
        
        <title>Microbiome Data Upload</title>
    </head>

    <body>
        <h1>Microbiome Data Upload</h1>
        <p>You can upload a csv file and view the columns and data appropriately.</p>

        <label for="myfile">Upload a CSV file:</label>
        <input type="file" id="myfile" name="myfile" accept=".csv" required>

        <div>
            <button type="submit" id="submit-file" >Upload File</button>
        </div>

        <div id="pagination">
            <label for="studiesPerPage">Studies Per Page:</label>
            <select id="studiesPerPage">
                <option value="10">10</option>
                <option value="25">25</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
        </div>

        <!--Actually probably make it a series of checkboxes for which columns they want displayed-->
    </body>
</html>
